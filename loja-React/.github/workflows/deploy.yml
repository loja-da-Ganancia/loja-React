name: Deploy React App

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
```

4. Clique em **Commit changes** e confirme

---

## 4. Acompanhar o deploy

1. Clique na aba **Actions** no topo do repositório
2. Você vai ver um workflow rodando chamado **"Deploy React App"**
3. Clique nele para ver o progresso em tempo real
4. Quando aparecer um **✅ verde**, o site está no ar!

